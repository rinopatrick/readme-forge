name: CI
on:
  push:
    branches: ["main", "master"]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint (optional)
        run: npm run lint --if-present
      - name: Test (optional)
        run: npm test --if-present
      - name: Build (optional)
        run: npm run build --if-present
